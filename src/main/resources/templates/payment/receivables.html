<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>沖帳管理</title>
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div class="app">
    <div th:replace="~{fragments :: sidebar('payment')}"></div>
    <main class="main">
        <div class="topbar">
            <div>
                <h1>沖帳管理</h1>
                <div class="subtitle">查詢銷貨單帳款狀態；狀態以未收金額判斷。</div>
            </div>

        </div>

        <div class="alert alert-info" th:if="${param.received}">沖帳完成。</div>

        <div class="card no-print">
            <div class="card-header">篩選條件</div>
            <div class="card-body">
                <form method="get" action="/payments/receivables" class="search-form">
                    <div class="grid grid-4">
                        <div><label>客戶代號</label><input name="customerCode" data-lookup="customers" data-fill="code" th:value="${customerCode}" placeholder="例如 C000001"></div>
                        <div><label>客戶名稱</label><input name="customerName" data-lookup="customers" data-fill="name" th:value="${customerName}" placeholder="輸入客戶名稱"></div>
                        <div><label>起始日期</label><input type="date" name="dateFrom" th:value="${dateFrom}"></div>
                        <div><label>結束日期</label><input type="date" name="dateTo" th:value="${dateTo}"></div>
                    </div>
                    <div class="grid grid-4">
                        <div>
                            <label>帳款狀態</label>
                            <select name="paymentStatus">
                                <option value="" th:selected="${paymentStatus == null || paymentStatus == ''}">全部</option>
                                <option value="PAID" th:selected="${paymentStatus == 'PAID'}">付清</option>
                                <option value="DEBT" th:selected="${paymentStatus == 'DEBT' || paymentStatus == 'UNPAID'}">欠款</option>
                            </select>
                        </div>
                        <div>
                            <label>付款類型</label>
                            <select name="paymentType">
                                <option value="" th:selected="${paymentType == null || paymentType == ''}">全部</option>
                                <option value="CASH" th:selected="${paymentType == 'CASH'}">現金</option>
                                <option value="TRANSFER" th:selected="${paymentType == 'TRANSFER'}">轉帳</option>
                                <option value="CREDIT" th:selected="${paymentType == 'CREDIT'}">欠款</option>
                            </select>
                        </div>
                    </div>
                    <div class="actions form-actions-separated">
                        <button class="btn btn-primary" type="submit">查詢</button>
                        <a class="btn btn-outline" href="/payments/receivables">清除</a>
                    </div>
                </form>
            </div>
        </div>

        <div class="card">
            <div class="card-header with-actions">
                <span>帳款列表</span>
                <div class="actions no-print">
                    <button class="btn btn-outline btn-compact" type="button" onclick="window.print()">列印</button>
                    <button class="btn btn-primary btn-compact" type="button" onclick="downloadTableCsv('paymentReceivablesTable', '帳款列表.csv')">下載</button>
                </div>
            </div>
            <div class="card-body table-scroll vertical-scroll">
                <table id="paymentReceivablesTable" class="resizable-table" data-table-key="payment-receivables">
                    <thead>
                    <tr>
                        <th>銷貨單號</th>
                        <th>銷貨日期</th>
                        <th>客戶代號</th>
                        <th>客戶名稱</th>
                        <th>總額</th>
                        <th>已收</th>
                        <th>未收</th>
                        <th>付款類型</th>
                        <th>狀態</th>
                        <th>最近收款</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="row : ${rows}">
                        <td><a th:href="@{'/sales/' + ${row.order.salesId} + '?edit=true'}" th:text="${row.order.salesNo}"></a></td>
                        <td th:text="${row.order.salesDate}"></td>
                        <td th:text="${row.customer != null ? row.customer.customerCode : ''}"></td>
                        <td th:text="${row.customer != null ? row.customer.customerName : '未指定'}"></td>
                        <td th:text="${row.order.totalAmount}"></td>
                        <td th:text="${row.order.paidAmount}"></td>
                        <td th:text="${row.order.unpaidAmount}"></td>
                        <td th:text="${row.order.paymentType == 'CASH' ? '現金' : (row.order.paymentType == 'TRANSFER' ? '轉帳' : (row.order.paymentType == 'CREDIT' ? '欠款' : row.order.paymentType))}"></td>
                        <td>
                            <span th:class="${row.order.unpaidAmount == null || row.order.unpaidAmount <= 0 ? 'badge badge-success' : 'badge badge-danger'}"
                                  th:text="${row.order.unpaidAmount == null || row.order.unpaidAmount <= 0 ? '付清' : '欠款'}"></span>
                        </td>
                        <td th:text="${row.lastPaymentDate}"></td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(rows)}"><td colspan="10">無符合條件資料</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>
<script src="/js/lookup-modal.js"></script>
<script src="/js/table-tools.js"></script>
</body>
</html>
