<!DOCTYPE html><html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><title>沖帳管理</title><link rel="stylesheet" href="/css/app.css"></head><body><div class="app"><div th:replace="~{fragments :: sidebar('payment')}"></div><main class="main"><div class="topbar"><div><h1>沖帳管理</h1><div class="subtitle">顯示未收款與部分收款銷貨單</div></div></div><div class="card"><div class="card-header">欠款列表</div><div class="card-body"><table><thead><tr><th>銷貨單號</th><th>日期</th><th>客戶ID</th><th>總額</th><th>已收</th><th>未收</th><th>狀態</th></tr></thead><tbody><tr th:each="o : ${orders}"><td th:text="${o.salesNo}"></td><td th:text="${o.salesDate}"></td><td th:text="${o.customerId}"></td><td th:text="${o.totalAmount}"></td><td th:text="${o.paidAmount}"></td><td th:text="${o.unpaidAmount}"></td><td th:text="${o.paymentStatus}"></td></tr></tbody></table></div></div></main></div></body></html>
