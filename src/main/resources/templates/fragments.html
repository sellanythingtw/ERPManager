<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="sidebar(active)" class="sidebar">
    <div class="brand">ERPManager</div>

    <div class="nav-title">工作台</div>
    <div th:class="${active == 'home'} ? 'nav-item active' : 'nav-item'"><a href="/">首頁</a></div>

    <div class="nav-title">基本資料</div>
    <div th:class="${active == 'suppliers'} ? 'nav-item active' : 'nav-item'"><a href="/suppliers">供應商管理</a></div>
    <div th:class="${active == 'customers'} ? 'nav-item active' : 'nav-item'"><a href="/customers">客戶管理</a></div>
    <div th:class="${active == 'products'} ? 'nav-item active' : 'nav-item'"><a href="/products">產品管理</a></div>

    <div class="nav-title">單據作業</div>
    <div th:class="${active == 'purchase'} ? 'nav-item active' : 'nav-item'"><a href="/purchases">進貨單</a></div>
    <div th:class="${active == 'sales'} ? 'nav-item active' : 'nav-item'"><a href="/sales">銷貨單</a></div>
    <div th:class="${active == 'payment'} ? 'nav-item active' : 'nav-item'"><a href="/payments/receivables">沖帳管理</a></div>

    <div th:class="${active == 'inventory'} ? 'nav-item active' : 'nav-item'"><a href="/inventory">即時庫存</a></div>
    <div th:class="${active == 'stockMovements'} ? 'nav-item active' : 'nav-item'"><a href="/reports/stock-movements">庫存異動表</a></div>

    <div class="nav-title">歷史報表</div>
    <div th:class="${active == 'supplierPurchases'} ? 'nav-item active' : 'nav-item'"><a href="/reports/supplier-purchases">供應商歷史進貨</a></div>
    <div th:class="${active == 'customerSales'} ? 'nav-item active' : 'nav-item'"><a href="/reports/customer-sales">客戶歷史銷貨</a></div>

    <div class="nav-title">系統設定</div>
    <div th:class="${active == 'settings'} ? 'nav-item active' : 'nav-item'"><a href="/settings">設定</a></div>
    <div th:class="${active == 'labelTemplates'} ? 'nav-item active' : 'nav-item'"><a href="/settings/label-templates">進貨貼紙範本</a></div>
</div>

</html>
