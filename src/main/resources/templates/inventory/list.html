<!DOCTYPE html><html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><title>即時庫存</title><link rel="stylesheet" href="/css/app.css"></head><body><div class="app"><div th:replace="~{fragments :: sidebar('inventory')}"></div><main class="main"><div class="topbar"><div><h1>即時庫存</h1><div class="subtitle">由 stock_movements 計算商品總庫存</div></div></div><div class="card"><div class="card-header">庫存列表</div><div class="card-body"><table><thead><tr><th>品號</th><th>類別</th><th>品名</th><th>小名</th><th>單位</th><th>庫存</th><th>安全庫存</th><th>狀態</th></tr></thead><tbody><tr th:each="r : ${rows}"><td th:text="${r.productCode}"></td><td th:text="${r.category}"></td><td th:text="${r.productName}"></td><td th:text="${r.productAlias}"></td><td th:text="${r.unit}"></td><td th:text="${r.quantity}"></td><td th:text="${r.safetyStock}"></td><td th:text="${r.status}"></td></tr></tbody></table></div></div></main></div></body></html>
