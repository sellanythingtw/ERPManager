<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>即時庫存</title>
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div class="app">
    <div th:replace="~{fragments :: sidebar('inventory')}"></div>
    <main class="main">
        <div class="topbar">
            <div>
                <h1>即時庫存</h1>
                <div class="subtitle">下方庫存列表可依欄位篩選與排序；品號可多選顯示。</div>
            </div>
        </div>


        <div class="card no-print">
            <div class="card-header">查詢條件</div>
            <div class="card-body">
                <form method="get" action="/inventory" class="search-form">
                    <div class="grid grid-4">
                        <div><label>類別</label><input name="category" th:value="${category}" placeholder="依產品類別查詢"></div>
                        <div><label>品名 / 品號 / 小名</label><input name="productName" th:value="${productName}" placeholder="輸入關鍵字"></div>
                        <div><label>供應商名稱</label><input name="supplierName" data-lookup="suppliers" data-fill="name" th:value="${supplierName}" placeholder="雙擊查詢供應商"></div>
                        <div><label>顏色</label><input name="color" th:value="${color}" placeholder="輸入顏色"></div>
                    </div>
                    <div class="grid grid-4">
                        <div>
                            <label>庫存</label>
                            <select name="stockFilter">
                                <option value="" th:selected="${stockFilter == null || stockFilter == ''}">全部</option>
                                <option value="POSITIVE" th:selected="${stockFilter == 'POSITIVE'}">有庫存</option>
                                <option value="ZERO" th:selected="${stockFilter == 'ZERO'}">零庫存</option>
                                <option value="LOW" th:selected="${stockFilter == 'LOW'}">低於安全庫存</option>
                            </select>
                        </div>
                        <div>
                            <label>狀態提示</label>
                            <select name="statusFilter">
                                <option value="" th:selected="${statusFilter == null || statusFilter == ''}">全部</option>
                                <option value="NORMAL" th:selected="${statusFilter == 'NORMAL'}">庫存充足</option>
                                <option value="LOW" th:selected="${statusFilter == 'LOW'}">庫存水位低</option>
                            </select>
                        </div>
                    </div>
                    <div class="actions form-actions-separated">
                        <button class="btn btn-primary" type="submit">查詢</button>
                        <a class="btn btn-outline" href="/inventory">清除</a>
                    </div>
                </form>
            </div>
        </div>

        <div class="card">
            <div class="card-header with-actions">
                <span>庫存列表</span>
                <div class="actions no-print">
                    <button class="btn btn-outline btn-compact" type="button" onclick="openColumnChooser('inventoryTable')">顯示欄位</button>
                    <button class="btn btn-outline btn-compact" onclick="window.print()">列印</button>
                    <a class="btn btn-primary btn-compact" th:href="@{/inventory/export.csv(category=${category},productName=${productName},supplierName=${supplierName},color=${color},stockFilter=${stockFilter},statusFilter=${statusFilter})}">下載</a>
                </div>
            </div>
            <div class="card-body">
                <div class="list-summary">
                    <span>品項數量：<strong th:text="${summary.itemCount}">0</strong></span>
                    <span>總數量：<strong th:text="${summary.totalQuantity}">0</strong></span>
                    <span>庫存金額：<strong th:text="${summary.stockAmount}">0</strong></span>
                </div>
                <div class="table-scroll inventory-table-scroll vertical-scroll">
                <table id="inventoryTable" class="excel-table resizable-table filterable-table" data-table-key="inventory">
                    <thead>
                    <tr>
                        <th data-sort="text" data-filterable="true" data-filter-label="品號">品號</th>
                        <th data-sort="text" data-filterable="true" data-filter-label="類別">類別</th>
                        <th data-sort="text" data-filterable="true" data-filter-label="品名">品名</th>
                        <th data-sort="text" data-filterable="true" data-filter-label="小名">小名</th>
                        <th data-sort="text" data-filterable="true" data-filter-label="供應商">供應商</th>
                        <th data-sort="text" data-filterable="true" data-filter-label="規格">規格</th>
                        <th data-sort="text" data-filterable="true" data-filter-label="顏色">顏色</th>
                        <th data-sort="text" data-filterable="true" data-filter-label="單位">單位</th>
                        <th data-sort="number" data-filterable="true" data-filter-label="預設進貨價">預設進貨價</th>
                        <th data-sort="number" data-filterable="true" data-filter-label="預設銷貨價">預設銷貨價</th>
                        <th data-sort="text" data-filterable="true" data-filter-label="備註">備註</th>
                        <th data-sort="text" data-filterable="true" data-filter-label="產品狀態">產品狀態</th>
                        <th data-sort="number" data-filterable="true" data-filter-label="庫存">庫存</th>
                        <th data-sort="number" data-filterable="true" data-filter-label="安全庫存">安全庫存</th>
                        <th data-sort="text" data-filterable="true" data-filter-label="狀況提示">狀況提示</th>
                        <th class="operation-th no-print" data-no-resize="true">操作</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="r : ${rows}" th:style="${r.rowBackground != null && r.rowBackground != '' ? 'background-color:' + r.rowBackground : ''}">
                        <td th:text="${r.productCode}"></td>
                        <td th:text="${r.category}"></td>
                        <td th:text="${r.productName}"></td>
                        <td th:text="${r.productAlias}"></td>
                        <td th:text="${r.supplierText}"></td>
                        <td th:text="${r.specification}"></td>
                        <td th:text="${r.color}"></td>
                        <td th:text="${r.unit}"></td>
                        <td th:text="${r.defaultPurchasePrice}"></td>
                        <td th:text="${r.defaultSalePrice}"></td>
                        <td th:text="${r.note}"></td>
                        <td th:text="${r.activeText}"></td>
                        <td th:text="${r.quantity}"></td>
                        <td th:text="${r.safetyStock}"></td>
                        <td class="inventory-status" th:classappend="${r.lowStock} ? ' inventory-low'" th:text="${r.statusText}"></td>
                        <td class="operation-cell no-print"><a class="btn btn-outline btn-compact" th:href="@{'/inventory/products/' + ${r.productId} + '/lots'}">查看批次</a></td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(rows)}"><td colspan="16">無符合條件資料。</td></tr>
                    </tbody>
                </table>
                </div>
            </div>
        </div>
    </main>
</div>


<script src="/js/table-tools.js"></script>
</body>
</html>
