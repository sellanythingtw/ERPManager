<!DOCTYPE html><html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><title>供應商管理</title><link rel="stylesheet" href="/css/app.css"></head><body><div class="app"><div th:replace="~{fragments :: sidebar('suppliers')}"></div><main class="main"><div class="topbar"><div><h1>供應商管理</h1><div class="subtitle">供應商代號會用於進貨貼紙</div></div></div><div class="card"><div class="card-header">新增 / 編輯供應商</div><div class="card-body"><input id="supplierId" type="hidden"><div class="grid grid-4"><div><label>供應商代號</label><input id="supplierCode" placeholder="空白則自動編號"></div><div><label>供應商名稱</label><input id="supplierName"></div><div><label>電話</label><input id="phone"></div><div><label>聯絡人</label><input id="contactPerson"></div><div><label>地址</label><input id="address"></div><div><label>帳期</label><input id="paymentTerms" value="月結30天"></div></div><p><button class="btn-primary" onclick="saveSupplier()">儲存供應商</button></p><div id="msg"></div></div></div><div class="card"><div class="card-header">供應商列表</div><div class="card-body"><table><thead><tr><th>代號</th><th>名稱</th><th>電話</th><th>聯絡人</th><th>帳期</th><th>操作</th></tr></thead><tbody><tr th:each="s : ${suppliers}"><td th:text="${s.supplierCode}"></td><td th:text="${s.supplierName}"></td><td th:text="${s.phone}"></td><td th:text="${s.contactPerson}"></td><td th:text="${s.paymentTerms}"></td><td><button class="btn btn-outline" type="button" th:attr="data-id=${s.supplierId},data-code=${s.supplierCode},data-name=${s.supplierName},data-phone=${s.phone},data-contact=${s.contactPerson},data-address=${s.address},data-terms=${s.paymentTerms}" onclick="editSupplier(this)">編輯</button></td></tr></tbody></table></div></div><script>async function saveSupplier(){const body={supplierId:val('supplierId')||null,supplierCode:val('supplierCode'),supplierName:val('supplierName'),phone:val('phone'),contactPerson:val('contactPerson'),address:val('address'),paymentTerms:val('paymentTerms')};const r=await fetch('/api/suppliers',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});const j=await r.json();document.getElementById('msg').innerHTML='<div class="alert alert-info">'+j.message+'</div>';if(j.success)setTimeout(()=>location.reload(),600);}function editSupplier(btn){document.getElementById('supplierId').value=btn.dataset.id||'';document.getElementById('supplierCode').value=btn.dataset.code||'';document.getElementById('supplierName').value=btn.dataset.name||'';document.getElementById('phone').value=btn.dataset.phone||'';document.getElementById('contactPerson').value=btn.dataset.contact||'';document.getElementById('address').value=btn.dataset.address||'';document.getElementById('paymentTerms').value=btn.dataset.terms||'';window.scrollTo({top:0,behavior:'smooth'});}function val(id){return document.getElementById(id).value;}</script></main></div></body></html>
