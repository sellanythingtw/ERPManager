<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>供應商管理</title><link rel="stylesheet" href="/css/app.css"></head>
<body><div class="app"><div th:replace="~{fragments :: sidebar('suppliers')}"></div><main class="main">
<div class="topbar"><div><h1>供應商管理</h1><div class="subtitle">預設顯示供應商列表；右上新增，列表可編輯。</div></div><div class="topbar-action-wrap">
  <div class="actions" id="listTopActions"><button class="btn btn-primary" type="button" onclick="newSupplier()">新增供應商</button></div>
</div></div>
<div class="card no-print" id="searchCard"><div class="card-header">查詢條件</div><div class="card-body"><form method="get" action="/suppliers" class="search-form"><div class="grid grid-4"><div><label>供應商代號</label><input name="supplierCode" th:value="${supplierCode}" placeholder="輸入供應商代號"></div><div><label>供應商名稱</label><input name="supplierName" th:value="${supplierName}" placeholder="輸入供應商名稱"></div></div><div class="actions form-actions-separated edit-form-actions"><button class="btn btn-primary" type="submit">查詢</button><a class="btn btn-outline" href="/suppliers">清除</a></div></form></div></div>
<div class="card" id="editCard" style="display:none;"><div class="card-header" style="display:flex;justify-content:space-between;align-items:center;"><span id="editTitle">新增供應商</span><div class="actions"><button id="voidBtn" class="btn btn-danger" type="button" style="display:none;" onclick="voidSupplier()">作廢</button><button id="restoreBtn" class="btn btn-primary" type="button" style="display:none;" onclick="restoreSupplier()">恢復</button></div></div><div class="card-body"><input id="supplierId" type="hidden"><input id="active" type="hidden" value="true"><div class="grid grid-4"><div><label>供應商代號</label><input id="supplierCode" placeholder="空白則自動編號"></div><div><label>供應商名稱</label><input id="supplierName"></div><div><label>電話</label><input id="phone"></div><div><label>聯絡人</label><input id="contactPerson"></div><div><label>地址</label><input id="address"></div><div><label>帳期</label><input id="paymentTerms" value="月結30天"></div></div><div class="actions form-actions-separated edit-form-actions"><button id="saveSupplierBtn" class="btn btn-primary" onclick="saveSupplier()">儲存供應商</button><a id="cancelBtn" class="btn btn-outline" href="/suppliers">取消</a></div><div id="msg"></div></div></div>
<div class="card" id="listCard"><div class="card-header with-actions">
                <span>供應商列表</span>
                <div class="actions no-print">
                    <button class="btn btn-outline btn-compact" type="button" onclick="openColumnChooser('supplierListTable')">顯示欄位</button>
                    <button class="btn btn-outline btn-compact" type="button" onclick="window.print()">列印</button>
                    <button class="btn btn-primary btn-compact" type="button" onclick="downloadTableCsv('supplierListTable', '供應商列表.csv')">下載</button>
                </div>
            </div><div class="card-body table-scroll vertical-scroll"><table id="supplierListTable" class="resizable-table" data-table-key="supplier-list"><thead><tr><th>代號</th><th>名稱</th><th>電話</th><th>聯絡人</th><th>地址</th><th>帳期</th><th>狀態</th><th data-no-resize="true" class="operation-th no-print">操作</th></tr></thead><tbody><tr th:each="s : ${suppliers}"><td th:text="${s.supplierCode}"></td><td th:text="${s.supplierName}"></td><td th:text="${s.phone}"></td><td th:text="${s.contactPerson}"></td><td th:text="${s.address}"></td><td th:text="${s.paymentTerms}"></td><td><span class="badge" th:classappend="${s.active == false ? ' badge-danger' : ' badge-success'}" th:text="${s.active == false ? '已作廢' : '正常'}"></span></td><td class="operation-cell no-print"><div class="list-row-actions"><button class="btn btn-outline" type="button" th:attr="data-id=${s.supplierId},data-code=${s.supplierCode},data-name=${s.supplierName},data-phone=${s.phone},data-contact=${s.contactPerson},data-address=${s.address},data-terms=${s.paymentTerms},data-active=${s.active}" onclick="viewSupplier(this)">查看</button><button class="btn btn-primary" type="button" th:attr="data-id=${s.supplierId},data-code=${s.supplierCode},data-name=${s.supplierName},data-phone=${s.phone},data-contact=${s.contactPerson},data-address=${s.address},data-terms=${s.paymentTerms},data-active=${s.active}" onclick="editSupplier(this)">編輯</button></div></td></tr><tr th:if="${#lists.isEmpty(suppliers)}"><td colspan="8">無符合條件資料。</td></tr></tbody></table></div></div>
<script>
async function saveSupplier(){const body={supplierId:val('supplierId')||null,supplierCode:val('supplierCode'),supplierName:val('supplierName'),phone:val('phone'),contactPerson:val('contactPerson'),address:val('address'),paymentTerms:val('paymentTerms'),active:val('active')!=='false'};const r=await fetch('/api/suppliers',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});const j=await r.json();document.getElementById('msg').innerHTML='<div class="alert alert-info">'+j.message+'</div>';if(j.success)setTimeout(()=>location.href='/suppliers',600);}
function showEdit(){document.getElementById('editCard').style.display='block';document.getElementById('listCard').style.display='none';document.getElementById('searchCard').style.display='none';document.getElementById('listTopActions').hidden=true;updateStatusButtons();window.scrollTo({top:0,behavior:'smooth'});}
let currentSupplierButton=null;function ensureViewTopActions(){
  let el=document.getElementById('viewTopActions');
  if(!el){
    el=document.createElement('div');
    el.id='viewTopActions';
    el.className='actions';
    el.innerHTML='<a class="btn btn-outline" href="/suppliers">返回列表</a><button class="btn btn-primary" type="button" onclick="editSupplierFromView()">編輯</button>';
    document.querySelector('.topbar-action-wrap').appendChild(el);
  }
  return el;
}
function removeViewTopActions(){
  const el=document.getElementById('viewTopActions');
  if(el) el.remove();
}
function setReadonlyMode(readonly){['supplierCode','supplierName','phone','contactPerson','address','paymentTerms'].forEach(id=>document.getElementById(id).readOnly=readonly);document.getElementById('saveSupplierBtn').style.display=readonly?'none':'inline-flex';document.getElementById('cancelBtn').style.display=readonly?'none':'inline-flex';}
function newSupplier(){removeViewTopActions();currentSupplierButton=null;removeViewTopActions();document.getElementById('editTitle').innerText='新增供應商';setReadonlyMode(false);['supplierId','supplierCode','supplierName','phone','contactPerson','address'].forEach(id=>document.getElementById(id).value='');document.getElementById('active').value='true';document.getElementById('paymentTerms').value='月結30天';showEdit();}
function fillSupplier(btn){document.getElementById('supplierId').value=btn.dataset.id||'';document.getElementById('supplierCode').value=btn.dataset.code||'';document.getElementById('supplierName').value=btn.dataset.name||'';document.getElementById('phone').value=btn.dataset.phone||'';document.getElementById('contactPerson').value=btn.dataset.contact||'';document.getElementById('address').value=btn.dataset.address||'';document.getElementById('paymentTerms').value=btn.dataset.terms||'';document.getElementById('active').value=String(btn.dataset.active)==='false'?'false':'true';updateStatusButtons();}
function editSupplier(btn){currentSupplierButton=btn;removeViewTopActions();document.getElementById('editTitle').innerText='編輯供應商';setReadonlyMode(false);showEdit();fillSupplier(btn);}
function viewSupplier(btn){currentSupplierButton=btn;document.getElementById('editTitle').innerText='查看供應商';setReadonlyMode(true);showEdit();fillSupplier(btn);document.getElementById('voidBtn').style.display='none';document.getElementById('restoreBtn').style.display='none';ensureViewTopActions();}
function editSupplierFromView(){if(currentSupplierButton){editSupplier(currentSupplierButton);}}
function updateStatusButtons(){const id=val('supplierId');const active=val('active')!=='false';document.getElementById('voidBtn').style.display=id&&active?'inline-flex':'none';document.getElementById('restoreBtn').style.display=id&&!active?'inline-flex':'none';}
async function voidSupplier(){const id=val('supplierId');if(!id)return;if(!confirm('確定作廢此供應商？'))return;const r=await fetch('/api/suppliers/'+id+'/void',{method:'POST'});const j=await r.json();document.getElementById('msg').innerHTML='<div class="alert alert-info">'+j.message+'</div>';if(j.success)setTimeout(()=>location.href='/suppliers',600);}
async function restoreSupplier(){const id=val('supplierId');if(!id)return;const r=await fetch('/api/suppliers/'+id+'/restore',{method:'POST'});const j=await r.json();document.getElementById('msg').innerHTML='<div class="alert alert-info">'+j.message+'</div>';if(j.success)setTimeout(()=>location.href='/suppliers',600);}
function val(id){return document.getElementById(id).value;}
</script></main></div><script src="/js/table-tools.js"></script>
</body></html>
