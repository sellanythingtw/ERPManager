<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>銷貨單明細</title>
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div class="app">
    <div th:replace="~{fragments :: sidebar('sales')}"></div>
    <main class="main">
        <div class="topbar">
            <div>
                <h1>銷貨單明細</h1>
                <div class="subtitle">刷入進貨貼紙條碼，輸入數量，確認後扣除對應批次庫存。</div>
            </div>
            <div class="actions purchase-top-actions">
                <a class="btn btn-outline" th:if="${!editMode}" href="/sales">返回列表</a>
                <a class="btn btn-primary" th:if="${!editMode and order.status != 'VOID' and !hasPaymentRecords}" th:href="@{'/sales/' + ${order.salesId} + '?edit=true'}">編輯單據</a>
                <a class="btn btn-outline" th:if="${!editMode and hasPaymentRecords}" th:href="@{'/payments/receivables/' + ${order.salesId}}">前往沖帳管理</a>
                <a class="btn btn-outline" th:if="${editMode}" th:href="@{'/sales/' + ${order.salesId}}">取消編輯</a>
            </div>
        </div>

        <div class="card doc-section-card">
            <div class="card-header with-actions">
                <span>單據資訊</span>
                <div class="actions title-actions">
                    <form method="post" th:if="${order.status == 'DRAFT' and editMode}" th:action="@{'/sales/' + ${order.salesId} + '/delete-draft'}" onsubmit="return confirm('確定刪除此草稿？此動作無法復原。')"><button class="btn btn-danger" type="submit">刪除草稿</button></form>
                    <form method="post" th:if="${canReturnToDraft}" th:action="@{'/sales/' + ${order.salesId} + '/return-to-draft'}" onsubmit="return confirm('確定退回編輯？系統會回補庫存，需修正後重新確認銷貨。')"><button class="btn btn-outline" type="submit">退回編輯</button></form>
                    <form method="post" th:if="${order.status == 'CONFIRMED'}" th:action="@{'/sales/' + ${order.salesId} + '/void'}" onsubmit="return confirm('確定作廢此銷貨單？作廢後仍可恢復。')"><button class="btn btn-danger" type="submit">作廢</button></form>
                    <form method="post" th:if="${order.status == 'VOID'}" th:action="@{'/sales/' + ${order.salesId} + '/restore'}" onsubmit="return confirm('確定恢復此銷貨單？')"><button class="btn btn-primary" type="submit">恢復</button></form>
                </div>
            </div>
            <div class="card-body">
                <form id="salesHeaderForm" method="post" th:if="${editMode and order.status != 'VOID'}" th:action="@{'/sales/' + ${order.salesId} + '/header'}">
                    <div class="grid grid-4">
                        <div><label>銷貨單號</label><input class="readonly-field" th:value="${order.salesNo}" readonly></div>
                        <div><label>銷貨日期</label><input type="date" name="salesDate" th:value="${order.salesDate}"></div>
                        <div>
                            <label class="required-label">客戶代號</label>
                            <input id="customerId" name="customerId" type="hidden" data-required-lookup="true" data-error-target="salesCustomerCode" th:value="${order.customerId}">
                            <input id="salesCustomerCode" data-lookup="customers" data-fill="code" data-target-id="customerId" data-pair-code="salesCustomerCode" data-pair-name="salesCustomerName" th:value="${customer != null ? customer.customerCode : ''}" placeholder="輸入後雙擊查詢">
                        </div>
                        <div>
                            <label class="required-label">客戶名稱</label>
                            <input id="salesCustomerName" data-lookup="customers" data-fill="name" data-target-id="customerId" data-pair-code="salesCustomerCode" data-pair-name="salesCustomerName" th:value="${customer != null ? customer.customerName : ''}" placeholder="輸入後雙擊查詢">
                        </div>
                        <div><label>狀態</label><input class="readonly-field" th:value="${order.status == 'CONFIRMED' ? '已確認' : (order.status == 'VOID' ? '已作廢' : '草稿')}" readonly></div>
                    </div>
                </form>
                <div class="grid grid-4" th:if="${!(editMode and order.status != 'VOID')}">
                    <div><label>銷貨單號</label><input class="readonly-field" th:value="${order.salesNo}" readonly></div>
                    <div><label>銷貨日期</label><input class="readonly-field" th:value="${order.salesDate}" readonly></div>
                    <div><label>客戶代號</label><input class="readonly-field" th:value="${customer != null ? customer.customerCode : ''}" readonly></div>
                    <div><label>客戶名稱</label><input class="readonly-field" th:value="${customer != null ? customer.customerName : '未指定'}" readonly></div>
                    <div><label>狀態</label><input class="readonly-field" th:value="${order.status == 'CONFIRMED' ? '已確認' : (order.status == 'VOID' ? '已作廢' : '草稿')}" readonly></div>
                </div>
            </div>
        </div>

        <div class="alert alert-info" th:if="${successMessage}" th:text="${successMessage}"></div>
        <div class="alert alert-error" th:if="${errorMessage}" th:text="${errorMessage}"></div>
        <div class="alert alert-error" th:if="${hasPaymentRecords}">
            此銷貨單已有收款紀錄，銷貨內容已鎖定。若需修改銷貨品項、數量、金額或客戶，請先至沖帳管理刪除或調整收款紀錄。
            <a class="btn btn-outline btn-compact" th:href="@{'/payments/receivables/' + ${order.salesId}}">前往沖帳管理</a>
        </div>

        <div class="card doc-section-card" th:if="${order.status == 'DRAFT' and editMode}">
            <div class="card-header">條碼掃描輸入</div>
            <div class="card-body">
                <div class="grid grid-4">
                    <div>
                        <label>條碼</label>
                        <input id="barcodeInput" placeholder="請刷入或輸入條碼後按 Enter" autofocus>
                    </div>
                    <div><label>品名</label><input id="lookupName" readonly></div>
                    <div><label>剩餘數量</label><input id="lookupQty" readonly></div>
                    <div><label>銷售單價</label><input id="lookupPrice" readonly></div>
                </div>
                <form method="post" th:action="@{'/sales/' + ${order.salesId} + '/items/barcode'}" style="margin-top:14px;">
                    <div class="grid grid-4">
                        <div><label>確認條碼</label><input id="barcodeValue" name="barcodeValue" required readonly></div>
                        <div><label>銷貨數量</label><input id="quantityInput" name="quantity" type="number" min="1" value="1" required></div>
                        <div><label>品項備註</label><input name="itemNote" placeholder="此品項備註"></div>
                        <div style="display:flex;align-items:end;"><button class="btn btn-primary" type="submit">加入銷貨明細</button></div>
                    </div>
                </form>
                <div id="scanMsg" class="alert alert-info">每次刷入條碼後，請先輸入數量並加入明細，再刷下一筆。</div>
            </div>
        </div>

        <div class="card doc-section-card">
            <div class="card-header">銷貨明細</div>
            <div class="card-body">
                <table>
                    <thead>
                    <tr><th>#</th><th>條碼</th><th>品號</th><th>品名</th><th>小名</th><th>供應商</th><th>進貨日</th><th>單價</th><th>數量</th><th>品項備註</th><th>小計</th><th th:if="${order.status == 'DRAFT' and editMode}">操作</th></tr>
                    </thead>
                    <tbody>
                    <tr th:each="item, st : ${items}">
                        <td th:text="${st.count}"></td>
                        <td th:text="${item.barcodeValue}"></td>
                        <td th:text="${item.productCode}"></td>
                        <td th:text="${item.productName}"></td>
                        <td th:text="${item.productAlias}"></td>
                        <td th:text="${item.supplierCode}"></td>
                        <td th:text="${item.purchaseDate}"></td>
                        <td th:text="${item.unitPrice}"></td>
                        <td th:text="${item.quantity}"></td>
                        <td th:text="${item.itemNote}"></td>
                        <td th:text="${item.amount}"></td>
                        <td th:if="${order.status == 'DRAFT'}">
                            <form method="post" th:action="@{'/sales/' + ${order.salesId} + '/items/' + ${item.itemId} + '/delete'}">
                                <button class="btn btn-outline" type="submit">刪除</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(items)}"><td colspan="11">尚未新增明細</td></tr>
                    </tbody>
                </table>
                <div class="grid grid-4" style="margin-top:16px;">
                    <div><label>總數量</label><input th:value="${order.totalQuantity}" readonly></div>
                    <div><label>未稅總額</label><input th:value="${order.subtotalAmount}" readonly></div>
                    <div><label>稅額</label><input th:value="${order.taxAmount}" readonly></div>
                    <div><label>總金額</label><input th:value="${order.totalAmount}" readonly></div>
                </div>
            </div>
        </div>

        <div class="card" th:if="${order.status == 'DRAFT' and editMode}">
            <div class="card-header">確認銷貨與付款類型</div>
            <div class="card-body">
                <form id="confirmSalesForm" method="post" th:action="@{'/sales/' + ${order.salesId} + '/confirm'}">
                    <div class="grid grid-4">
                        <div>
                            <label>付款類型</label>
                            <select name="paymentType">
                                <option value="CASH">現金</option>
                                <option value="TRANSFER">轉帳</option>
                                <option value="CREDIT">欠款</option>
                            </select>
                        </div>
                        <div>
                            <label>付款狀況</label>
                            <select name="paymentStatus">
                                <option value="PAID">已付款</option>
                                <option value="UNPAID">待付款</option>
                            </select>
                        </div>
                    </div>
                    <div class="page-bottom-actions">
                        <button class="btn btn-primary" type="submit" th:formaction="@{'/sales/' + ${order.salesId} + '/header'}">儲存草稿</button>
                        <button class="btn btn-outline" type="submit" onclick="return confirm('確認銷貨後會扣除批次庫存，是否繼續？')">儲存並確認銷貨</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="card" th:if="${order.status == 'CONFIRMED' and !editMode}">
            <div class="card-header">確認結果</div>
            <div class="card-body">
                <div class="grid grid-4">
                    <div><label>總數量</label><input th:value="${order.totalQuantity}" readonly></div>
                    <div><label>總金額</label><input th:value="${order.totalAmount}" readonly></div>
                    <div><label>付款類型</label><input class="readonly-field" th:value="${order.paymentType == 'CASH' ? '現金' : (order.paymentType == 'TRANSFER' ? '轉帳' : (order.paymentType == 'CREDIT' ? '欠款' : order.paymentType))}" readonly></div>
                    <div><label>付款狀態</label><input class="readonly-field" th:value="${order.paymentStatus == 'PAID' ? '已付款' : (order.paymentStatus == 'UNPAID' ? '待付款' : (order.paymentStatus == 'PARTIAL' ? '部分付款' : order.paymentStatus))}" readonly></div>
                </div>
                <div class="actions" style="margin-top:16px;" th:if="${order.pdfPath != null}">
                    <a class="btn btn-primary" th:href="@{/local-file/print(path=${order.pdfPath})}" target="_blank">列印 PDF</a>
                    <a class="btn btn-outline" th:href="@{/local-file/download(path=${order.pdfPath})}">下載 PDF</a>
                    <a class="btn btn-outline" th:href="@{/local-file/open-folder(path=${order.pdfPath}, back=${'/sales/' + order.salesId})}">打開資料夾</a>
                </div>
            </div>
        </div>
        <div class="page-bottom-actions" th:if="${editMode and order.status == 'CONFIRMED'}">
            <button class="btn btn-primary" type="submit" form="salesHeaderForm">儲存單據並更新 PDF</button>
        </div>
    </main>
</div>
<script>
const barcodeInput = document.getElementById('barcodeInput');
const msg = document.getElementById('scanMsg');
if (barcodeInput) {
    barcodeInput.addEventListener('keydown', async function(e) {
        if (e.key !== 'Enter') return;
        e.preventDefault();
        const code = barcodeInput.value.trim();
        if (!code) return;
        try {
            const r = await fetch('/api/sales/barcode/' + encodeURIComponent(code));
            const j = await r.json();
            if (!j.success) throw new Error(j.message || '查詢失敗');
            const d = j.data;
            document.getElementById('barcodeValue').value = d.barcodeValue;
            document.getElementById('lookupName').value = d.productName + (d.productAlias ? ' ' + d.productAlias : '');
            document.getElementById('lookupQty').value = d.remainingQuantity;
            document.getElementById('lookupPrice').value = d.salePrice;
            document.getElementById('quantityInput').max = d.remainingQuantity;
            msg.className = 'alert alert-info';
            msg.innerText = '已帶入品項，請輸入數量並加入明細。';
            document.getElementById('quantityInput').focus();
            document.getElementById('quantityInput').select();
        } catch (err) {
            msg.className = 'alert alert-error';
            msg.innerText = err.message;
        }
    });
    document.getElementById('quantityInput').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            const max = Number(this.max || 0);
            const qty = Number(this.value || 0);
            if (max > 0 && qty > max) {
                msg.className = 'alert alert-error';
                msg.innerText = '數量不足，目前剩餘：' + max;
                return;
            }
            this.form.submit();
        }
    });
}
</script>
<script src="/js/lookup-modal.js"></script>
</body>
</html>
