<!DOCTYPE html><html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><title>銷貨單</title><link rel="stylesheet" href="/css/app.css"></head><body><div class="app"><div th:replace="~{fragments :: sidebar('sales')}"></div><main class="main"><div class="topbar"><div><h1>銷貨單</h1><div class="subtitle">刷條碼後帶入批次資料，輸入數量並檢查剩餘庫存</div></div></div><div class="card"><div class="card-header">條碼掃描測試</div><div class="card-body"><div class="grid grid-3"><div><label>條碼</label><input id="barcode" autofocus onkeydown="if(event.key==='Enter') lookupBarcode()"></div><div><label>數量</label><input id="quantity" type="number" value="1"></div><div><label>銷貨單 ID</label><input id="salesId" placeholder="先建立草稿取得ID"></div></div><p><button class="btn-primary" onclick="lookupBarcode()">查詢條碼</button> <button class="btn-outline" onclick="addItem()">加入銷貨明細</button></p><div id="msg"></div></div></div><script>async function lookupBarcode(){const bc=val('barcode'); const r=await fetch('/api/sales/barcode/'+encodeURIComponent(bc)); const j=await r.json(); document.getElementById('msg').innerHTML='<pre>'+JSON.stringify(j,null,2)+'</pre>'; if(j.success) document.getElementById('quantity').focus();}async function addItem(){const fd=new URLSearchParams();fd.append('barcodeValue',val('barcode'));fd.append('quantity',val('quantity'));const r=await fetch('/api/sales/'+val('salesId')+'/items/barcode',{method:'POST',body:fd});const j=await r.json();document.getElementById('msg').innerHTML='<pre>'+JSON.stringify(j,null,2)+'</pre>';if(j.success){document.getElementById('barcode').value='';document.getElementById('barcode').focus();}}function val(id){return document.getElementById(id).value;}</script></main></div></body></html>
