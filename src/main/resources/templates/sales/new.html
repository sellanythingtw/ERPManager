<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>新增銷貨單</title>
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div class="app">
    <div th:replace="~{fragments :: sidebar('sales')}"></div>
    <main class="main">
        <div class="topbar">
            <div>
                <h1>新增銷貨單</h1>
                <div class="subtitle">直接建立銷貨草稿，日期預設今天；客戶可先空白，稍後於草稿中編輯。</div>
            </div>
            <div><a class="btn btn-outline" href="/sales">返回銷貨單列表</a></div>
        </div>

        <div class="card">
            <div class="card-header">建立銷貨草稿</div>
            <div class="card-body">
                <form method="post" action="/sales/draft">
                    <div class="grid grid-3">
                        <div>
                            <label>客戶</label>
                            <select name="customerId">
                                <option value="">未指定，稍後再選</option>
                                <option th:each="c : ${customers}" th:value="${c.customerId}" th:text="${c.customerCode + '｜' + c.customerName}"></option>
                            </select>
                        </div>
                        <div>
                            <label>銷貨日期</label>
                            <input name="salesDate" type="date" th:value="${#temporals.format(today, 'yyyy-MM-dd')}">
                        </div>
                        <div style="display:flex;align-items:end;">
                            <button class="btn-primary" type="submit">儲存草稿</button>
                        </div>
                    </div>
                </form>
                <div class="alert alert-info">
                    銷貨前需先有已確認進貨批次，才能刷貼紙條碼出貨。
                </div>
            </div>
        </div>
    </main>
</div>
</body>
</html>
