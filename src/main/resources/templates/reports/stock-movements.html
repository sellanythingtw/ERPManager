<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>庫存異動表</title><link rel="stylesheet" href="/css/app.css"></head>
<body><div class="app">
<div th:replace="~{fragments :: sidebar('stockMovements')}"></div>
<main class="main">
  <div class="topbar"><div><h1>庫存異動表</h1><div class="subtitle">條列目標品項期間內所有進貨與銷貨紀錄。</div></div></div>
  <div class="card no-print"><div class="card-header">搜尋條件</div><div class="card-body">
    <form method="get" action="/reports/stock-movements" class="search-form">
      <div class="grid grid-4">
        <div><label>品號</label><input name="productCode" data-lookup="products" data-fill="code" th:value="${productCode}" placeholder="雙擊查詢"></div>
        <div><label>品名</label><input name="productName" data-lookup="products" data-fill="name" th:value="${productName}" placeholder="雙擊查詢"></div>
        <div><label>起始日期</label><input type="date" name="dateFrom" th:value="${dateFrom}"></div>
        <div><label>結束日期</label><input type="date" name="dateTo" th:value="${dateTo}"></div>
      </div>
      <div class="actions form-actions-separated"><button class="btn btn-primary" type="submit">查詢</button><a class="btn btn-outline" href="/reports/stock-movements">清除</a></div>
    </form>
  </div></div>
  <div class="card"><div class="card-header with-actions"><span>庫存異動列表</span><div class="actions no-print">
    <button class="btn btn-outline btn-compact" type="button" onclick="openColumnChooser('stockMovementTable')">顯示欄位</button>
    <button class="btn btn-outline btn-compact" type="button" onclick="window.print()">列印</button>
    <button class="btn btn-primary btn-compact" type="button" onclick="downloadTableCsv('stockMovementTable','庫存異動表.csv')">下載</button>
  </div></div>
  <div class="card-body">
    <div class="report-summary-line" th:text="${'筆數：' + summary.rowCount + ' | 總數量：' + summary.totalQuantity + ' | 總金額：NT$' + summary.totalAmount}">筆數：0 | 總數量：0 | 總金額：NT$0</div><div class="report-summary-spacer"></div>
    <div class="table-scroll vertical-scroll"><table id="stockMovementTable" class="resizable-table filterable-table" data-table-key="stock-movement-history"><thead><tr>
      <th data-sort="text" data-filterable="true" data-filter-label="類型">類型</th><th data-sort="text" data-filterable="true" data-filter-label="日期">日期</th><th data-sort="text" data-filterable="true" data-filter-label="對象代號">對象代號</th><th data-sort="text" data-filterable="true" data-filter-label="對象名稱">對象名稱</th><th data-sort="text" data-filterable="true" data-filter-label="單據號碼">單據號碼</th><th data-sort="text" data-filterable="true" data-filter-label="品號">品號</th><th data-sort="text" data-filterable="true" data-filter-label="品名">品名</th><th data-sort="text" data-filterable="true" data-filter-label="小名">小名</th><th data-sort="text" data-filterable="true" data-filter-label="規格">規格</th><th data-sort="number" data-filterable="true" data-filter-label="單價">單價</th><th data-sort="number" data-filterable="true" data-filter-label="數量">數量</th><th data-sort="number" data-filterable="true" data-filter-label="進貨數量">進貨數量</th><th data-sort="number" data-filterable="true" data-filter-label="銷貨數量">銷貨數量</th><th data-sort="number" data-filterable="true" data-filter-label="總金額">總金額</th><th data-sort="text" data-filterable="true" data-filter-label="品項備註">品項備註</th>
    </tr></thead><tbody>
      <tr th:each="r : ${rows}"><td th:text="${r.type}"></td><td th:text="${r.date}"></td><td th:text="${r.partnerCode}"></td><td th:text="${r.partnerName}"></td><td th:text="${r.sourceNo}"></td><td th:text="${r.productCode}"></td><td th:text="${r.productName}"></td><td th:text="${r.productAlias}"></td><td th:text="${r.specification}"></td><td th:text="${r.unitPrice}"></td><td th:text="${r.quantity}"></td><td th:text="${r.quantityIn}"></td><td th:text="${r.quantityOut}"></td><td th:text="${r.amount}"></td><td th:text="${r.itemNote}"></td></tr>
      <tr th:if="${#lists.isEmpty(rows)}"><td colspan="15">無符合條件資料。</td></tr>
    </tbody></table></div>
  </div></div>
</main></div><script src="/js/lookup-modal.js"></script><script src="/js/table-tools.js"></script></body></html>
