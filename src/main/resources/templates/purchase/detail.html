<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>進貨單明細</title>
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div class="app">
    <div th:replace="~{fragments :: sidebar('purchase')}"></div>
    <main class="main">
        <div class="topbar">
            <div>
                <h1>進貨單明細</h1>
                <div class="subtitle">確認進貨後會建立進貨批次、條碼與庫存入庫異動。</div>
            </div>
            <div>
                <a class="btn btn-outline" href="/purchases/new">新增進貨單</a>
            </div>
        </div>

        <div class="card">
            <div class="card-header">單據資訊</div>
            <div class="card-body">
                <div class="grid grid-4">
                    <div><label>進貨單號</label><input th:value="${order.purchaseNo}" readonly></div>
                    <div><label>進貨日期</label><input th:value="${order.purchaseDate}" readonly></div>
                    <div><label>供應商</label><input th:value="${supplier != null ? supplier.supplierName : '未指定'}" readonly></div>
                    <div><label>狀態</label><input th:value="${order.status}" readonly></div>
                </div>
            </div>
        </div>

        <div class="card" th:if="${order.status == 'DRAFT'}">
            <div class="card-header">新增進貨品項</div>
            <div class="card-body">
                <form method="post" th:action="@{'/purchases/' + ${order.purchaseId} + '/items'}">
                    <div class="grid grid-4">
                        <div>
                            <label>產品</label>
                            <select name="productId" required>
                                <option value="">請選擇產品</option>
                                <option th:each="p : ${products}" th:value="${p.productId}" th:text="${p.productCode + '｜' + p.productName + '｜' + (p.productAlias ?: '')}"></option>
                            </select>
                        </div>
                        <div><label>批發價</label><input name="wholesalePrice" type="number" step="1" value="0"></div>
                        <div><label>銷售價</label><input name="salePrice" type="number" step="1" value="0"></div>
                        <div><label>數量</label><input name="quantity" type="number" min="1" value="1" required></div>
                    </div>
                    <div class="grid grid-4" style="margin-top:14px;">
                        <div><label>盤數代號</label><input name="trayQuantityCode" placeholder="例如 P15"></div>
                        <div><label>尺寸代號</label><input name="sizeCode" placeholder="例如 k0"></div>
                        <div style="display:flex;align-items:end;"><button class="btn-primary" type="submit">加入明細</button></div>
                    </div>
                </form>
            </div>
        </div>

        <div class="card">
            <div class="card-header">進貨明細</div>
            <div class="card-body">
                <div class="alert alert-info" th:if="${param.label}">單一貼紙 PDF 已產生，請至 app/files/labels/purchase 查看。</div>
                <div class="alert alert-info" th:if="${param.labels}">整張進貨單貼紙 PDF 已產生，請至 app/files/labels/purchase 查看。</div>
                <form method="post" th:action="@{'/labels/purchases/' + ${order.purchaseId} + '/batch'}" style="margin-bottom:14px; display:flex; gap:10px; align-items:end;">
                    <div style="width:160px;"><label>每個品項列印張數</label><input name="copies" type="number" min="1" value="1"></div>
                    <button class="btn-primary" type="submit">列印全部貼紙 PDF</button>
                    <a class="btn btn-outline" href="/settings/labels">貼紙設定</a>
                </form>
                <table>
                    <thead>
                    <tr>
                        <th>#</th><th>品號</th><th>品名</th><th>小名</th><th>批發價</th><th>銷售價</th><th>P</th><th>尺寸</th><th>數量</th><th>小計</th><th th:if="${order.status == 'DRAFT'}">操作</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="item, st : ${items}">
                        <td th:text="${st.count}"></td>
                        <td th:text="${item.productCode}"></td>
                        <td th:text="${item.productName}"></td>
                        <td th:text="${item.productAlias}"></td>
                        <td th:text="${item.wholesalePrice}"></td>
                        <td th:text="${item.salePrice}"></td>
                        <td th:text="${item.trayQuantityCode}"></td>
                        <td th:text="${item.sizeCode}"></td>
                        <td th:text="${item.quantity}"></td>
                        <td th:text="${item.amount}"></td>
                        <td th:if="${order.status == 'DRAFT'}">
                            <form method="post" th:action="@{'/purchases/' + ${order.purchaseId} + '/items/' + ${item.itemId} + '/delete'}">
                                <button type="submit" class="btn-outline">刪除</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(items)}"><td colspan="11">尚未新增明細</td></tr>
                    </tbody>
                </table>
                <div style="margin-top:16px;" th:if="${order.status == 'DRAFT'}">
                    <form method="post" th:action="@{'/purchases/' + ${order.purchaseId} + '/confirm'}" onsubmit="return confirm('確認進貨後會建立批次、條碼並增加庫存，是否繼續？')">
                        <button class="btn-primary" type="submit">確認進貨並建立條碼批次</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="card" th:if="${order.status == 'CONFIRMED'}">
            <div class="card-header">進貨批次與貼紙</div>
            <div class="card-body">
                <table>
                    <thead>
                    <tr><th>條碼</th><th>品名</th><th>進貨日</th><th>批發價</th><th>銷售價</th><th>剩餘</th><th>列印次數</th><th>操作</th></tr>
                    </thead>
                    <tbody>
                    <tr th:each="lot : ${lots}">
                        <td th:text="${lot.barcodeValue}"></td>
                        <td th:text="${lot.productName + ' ' + (lot.productAlias ?: '')}"></td>
                        <td th:text="${lot.purchaseDateCode}"></td>
                        <td th:text="${lot.wholesalePrice}"></td>
                        <td th:text="${lot.salePrice}"></td>
                        <td th:text="${lot.remainingQuantity}"></td>
                        <td th:text="${lot.labelPrintedCount}"></td>
                        <td>
                            <form method="post" th:action="@{'/labels/lots/' + ${lot.lotId}}">
                                <input type="hidden" name="purchaseId" th:value="${order.purchaseId}">
                                <button class="btn-outline" type="submit">產生貼紙 PDF</button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
                <div class="alert alert-info" th:if="${order.pdfPath != null}">進貨單 PDF：<a th:href="@{/local-file(path=${order.pdfPath})}" target="_blank" th:text="${order.pdfPath}"></a></div>
            </div>
        </div>
    </main>
</div>
</body>
</html>
