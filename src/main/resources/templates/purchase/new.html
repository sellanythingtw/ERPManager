<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>新增進貨單</title>
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div class="app">
    <div th:replace="~{fragments :: sidebar('purchase')}"></div>
    <main class="main">
        <div class="topbar">
            <div>
                <h1>新增進貨單</h1>
                <div class="subtitle">直接進入完整表單；供應商與品項可先空白，儲存草稿後留在進貨單列表。</div>
            </div>
            <div class="actions"><a class="btn btn-outline" href="/purchases">返回進貨單列表</a></div>
        </div>
        <div class="alert alert-error" th:if="${errorMessage}" th:text="${errorMessage}"></div>

        <form method="post" action="/purchases/create-full">
            <div class="card">
                <div class="card-header">單據表頭</div>
                <div class="card-body">
                    <div class="grid grid-4">
                        <div><label>進貨日期</label><input type="date" name="purchaseDate" th:value="${#temporals.format(today, 'yyyy-MM-dd')}"></div>
                        <div>
                            <label>供應商</label>
                            <select name="supplierId" class="refresh-on-focus">
                                <option value="">未指定，稍後再選</option>
                                <option th:each="s : ${suppliers}" th:value="${s.supplierId}" th:text="${s.supplierName}"></option>
                                <option value="__new__">＋ 新增供應商...</option>
                            </select>
                        </div>
                        <div><label>是否計稅</label><select name="taxEnabled"><option value="false">否</option><option value="true">是，5%</option></select></div>
                        <div><label>備註</label><input name="note" placeholder="可輸入備註"></div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">進貨品項</div>
                <div class="card-body">
                    <div class="alert alert-info">可先不選品項直接儲存草稿；若下拉選單資料不足，可於新分頁新增後回到此頁重新整理。</div>
                    <div class="grid grid-4">
                        <div>
                            <label>產品</label>
                            <select name="productId" class="refresh-on-focus">
                                <option value="">不新增品項，稍後再加</option>
                                <option th:each="p : ${products}" th:value="${p.productId}" th:text="${p.productCode + '｜' + p.productName + '｜' + (p.productAlias ?: '')}"></option>
                                <option value="__new__">＋ 新增產品...</option>
                            </select>
                        </div>
                        <div><label>批發價</label><input name="wholesalePrice" type="number" step="1" value="0"></div>
                        <div><label>銷售價</label><input name="salePrice" type="number" step="1" value="0"></div>
                        <div><label>數量</label><input name="quantity" type="number" min="1" value="1"></div>
                    </div>
                    <div class="grid grid-4" style="margin-top:14px;">
                        <div><label>P</label><input name="trayQuantityCode" placeholder="例如 P15"></div>
                        <div><label>尺寸</label><input name="sizeCode" placeholder="例如 K0"></div>
                        <div>
                            <label>貼紙範本</label>
                            <select name="labelSettingId" class="refresh-on-focus">
                                <option value="" th:if="${#lists.isEmpty(labelTemplates)}">尚未建立貼紙範本</option>
                                <option th:each="tpl : ${labelTemplates}" th:value="${tpl.settingId}" th:text="${tpl.templateName + (tpl.defaultTemplate ? '（預設）' : '')}"></option>
                                <option value="__new__">＋ 新增進貨貼紙範本...</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <div class="actions">
                <button class="btn-primary" name="action" value="draft" type="submit">儲存草稿</button>
                <button class="btn-outline" name="action" value="confirm" type="submit" onclick="return confirm('確認進貨後會建立批次、條碼並增加庫存，是否繼續？')">儲存並確認進貨</button>
            </div>
        </form>
    </main>
</div>
<script>
function handleSpecialSelect(select){
  select.addEventListener('change', function(){
    if (this.value === '__new__') {
      const name = this.getAttribute('name');
      if (name === 'supplierId') window.open('/suppliers', '_blank');
      if (name === 'productId') window.open('/products', '_blank');
      if (name === 'labelSettingId') window.open('/settings/label-templates', '_blank');
      this.value='';
    }
  });
}
async function refreshSelectOptions(type){
  let url = '', selector = '', emptyLabel = '';
  if (type === 'suppliers') { url='/api/options/suppliers'; selector='select[name="supplierId"]'; emptyLabel='未指定，稍後再選'; }
  if (type === 'products') { url='/api/options/products'; selector='select[name="productId"]'; emptyLabel='不新增品項，稍後再加'; }
  if (type === 'labels') { url='/api/options/label-templates'; selector='select[name="labelSettingId"]'; emptyLabel='尚未建立貼紙範本'; }
  if (!url) return;
  const list = await fetch(url).then(r => r.json()).catch(() => null);
  if (!list) return;
  document.querySelectorAll(selector).forEach(select => {
    const current = select.value;
    const specialText = type === 'suppliers' ? '＋ 新增供應商...' : (type === 'products' ? '＋ 新增產品...' : '＋ 新增進貨貼紙範本...');
    select.innerHTML = '';
    const empty = document.createElement('option');
    empty.value = '';
    empty.textContent = list.length === 0 && type === 'labels' ? '尚未建立貼紙範本' : emptyLabel;
    select.appendChild(empty);
    list.forEach(item => {
      const opt = document.createElement('option');
      opt.value = item.id;
      opt.textContent = item.label;
      if (String(current) === String(item.id)) opt.selected = true;
      select.appendChild(opt);
    });
    const add = document.createElement('option');
    add.value = '__new__';
    add.textContent = specialText;
    select.appendChild(add);
  });
}
document.querySelectorAll('select').forEach(handleSpecialSelect);
window.addEventListener('focus', function(){
  refreshSelectOptions('suppliers');
  refreshSelectOptions('products');
  refreshSelectOptions('labels');
});
</script>
</body>
</html>
