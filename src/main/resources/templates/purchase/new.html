<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>新增進貨單</title>
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div class="app">
    <div th:replace="~{fragments :: sidebar('purchase')}"></div>
    <main class="main">
        <div class="topbar">
            <div>
                <h1>新增進貨單</h1>
                <div class="subtitle">先存為草稿，再進入明細頁新增進貨品項；草稿會保留在進貨單列表中。</div>
            </div>
            <div><a class="btn btn-outline" href="/purchases">返回進貨單列表</a></div>
        </div>

        <div class="card">
            <div class="card-header">建立進貨草稿</div>
            <div class="card-body">
                <form method="post" action="/purchases/draft">
                    <div class="grid grid-3">
                        <div>
                            <label>供應商</label>
                            <select name="supplierId" required>
                                <option value="">請選擇供應商</option>
                                <option th:each="s : ${suppliers}" th:value="${s.supplierId}" th:text="${s.supplierCode + '｜' + s.supplierName}"></option>
                            </select>
                        </div>
                        <div>
                            <label>進貨日期</label>
                            <input name="purchaseDate" type="date">
                        </div>
                        <div style="display:flex;align-items:end;">
                            <button class="btn-primary" type="submit">存為草稿並進入明細</button>
                        </div>
                    </div>
                </form>
                <div class="alert alert-info">
                    若尚未建立供應商或產品，請先到「供應商管理」與「商品管理」建檔。
                </div>
            </div>
        </div>
    </main>
</div>
</body>
</html>
