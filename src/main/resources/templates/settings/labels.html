<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>進貨貼紙範本</title>
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div class="app">
    <div th:replace="~{fragments :: sidebar('labelTemplates')}"></div>
    <main class="main">
        <div class="topbar">
            <div>
                <h1>進貨貼紙範本</h1>
                <div class="subtitle">可建立多組進貨貼紙格式。進貨單的每個品項可選擇要套用哪一個範本。</div>
            </div>
            <div class="actions">
                <form method="post" action="/settings/labels/new"><button class="btn-primary" type="submit">＋ 新增範本</button></form>
            </div>
        </div>
        <div class="alert alert-info" th:if="${successMessage}" th:text="${successMessage}"></div>
        <div class="alert alert-error" th:if="${errorMessage}" th:text="${errorMessage}"></div>

        <div class="grid" style="grid-template-columns: 320px 1fr; align-items:start;">
            <div class="card">
                <div class="card-header">範本列表</div>
                <div class="card-body">
                    <table>
                        <thead><tr><th>範本</th><th>預設</th></tr></thead>
                        <tbody>
                        <tr th:each="tpl : ${templates}">
                            <td><a th:href="@{/settings/label-templates(settingId=${tpl.settingId})}" th:text="${tpl.templateName}"></a></td>
                            <td th:text="${tpl.defaultTemplate} ? '是' : ''"></td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="card">
                <div class="card-header">範本設定</div>
                <div class="card-body">
                    <form method="post" action="/settings/labels" th:object="${setting}">
                        <input type="hidden" th:field="*{settingId}">
                        <div class="grid grid-4">
                            <div><label>範本名稱</label><input th:field="*{templateName}" required></div>
                            <div><label>設為預設</label><select th:field="*{defaultTemplate}"><option value="false">否</option><option value="true">是</option></select></div>
                            <div><label>標籤寬度 mm</label><input th:field="*{labelWidthMm}" type="number" step="0.1"></div>
                            <div><label>標籤高度 mm</label><input th:field="*{labelHeightMm}" type="number" step="0.1"></div>
                        </div>
                        <div class="grid grid-4" style="margin-top:14px;">
                            <div><label>上邊距 mm</label><input th:field="*{marginTopMm}" type="number" step="0.1"></div>
                            <div><label>左邊距 mm</label><input th:field="*{marginLeftMm}" type="number" step="0.1"></div>
                            <div><label>大字尺寸</label><input th:field="*{fontSizeLarge}" type="number"></div>
                            <div><label>一般字尺寸</label><input th:field="*{fontSizeNormal}" type="number"></div>
                        </div>
                        <div class="grid grid-4" style="margin-top:14px;">
                            <div><label>條碼寬度 mm</label><input th:field="*{barcodeWidthMm}" type="number" step="0.1"></div>
                            <div><label>條碼高度 mm</label><input th:field="*{barcodeHeightMm}" type="number" step="0.1"></div>
                            <div><label>顯示邊框</label><select th:field="*{showBorder}"><option value="true">是</option><option value="false">否</option></select></div>
                            <div style="display:flex;align-items:end;"><button class="btn-primary" type="submit">儲存範本</button></div>
                        </div>
                    </form>
                    <form method="post" th:if="${setting.settingId != null and !setting.defaultTemplate}" th:action="@{'/settings/labels/' + ${setting.settingId} + '/delete'}" style="margin-top:12px;" onsubmit="return confirm('確定刪除此範本？')">
                        <button class="btn-outline" type="submit">刪除範本</button>
                    </form>
                    <div class="alert alert-info">
                        精準對位方式：先確認標籤紙實際尺寸，輸入寬高後列印測試。若文字偏上，增加「上邊距」；偏左，增加「左邊距」；條碼壓到文字，降低「條碼高度」或提高上邊距。不同標籤機驅動邊界不同，需在客戶 Windows 標籤機上以 100% 實際大小測試。
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>
</body>
</html>
