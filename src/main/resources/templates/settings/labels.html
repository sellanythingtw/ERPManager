<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>貼紙設定</title>
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div class="app">
    <div th:replace="~{fragments :: sidebar('settings')}"></div>
    <main class="main">
        <div class="topbar">
            <div>
                <h1>貼紙列印設定</h1>
                <div class="subtitle">設定進貨品項貼紙尺寸、邊距、文字大小與條碼尺寸。</div>
            </div>
        </div>

        <div class="alert alert-info" th:if="${param.saved}">貼紙設定已儲存。</div>

        <div class="card">
            <div class="card-header">標籤尺寸</div>
            <div class="card-body">
                <form method="post" th:action="@{/settings/labels}" th:object="${setting}">
                    <input type="hidden" th:field="*{settingId}">
                    <div class="grid grid-4">
                        <div><label>標籤寬度 mm</label><input type="number" step="0.1" th:field="*{labelWidthMm}"></div>
                        <div><label>標籤高度 mm</label><input type="number" step="0.1" th:field="*{labelHeightMm}"></div>
                        <div><label>上邊距 mm</label><input type="number" step="0.1" th:field="*{marginTopMm}"></div>
                        <div><label>左邊距 mm</label><input type="number" step="0.1" th:field="*{marginLeftMm}"></div>
                    </div>
                    <div class="grid grid-4" style="margin-top:14px;">
                        <div><label>大字尺寸</label><input type="number" th:field="*{fontSizeLarge}"></div>
                        <div><label>一般字尺寸</label><input type="number" th:field="*{fontSizeNormal}"></div>
                        <div><label>條碼寬度 mm</label><input type="number" step="0.1" th:field="*{barcodeWidthMm}"></div>
                        <div><label>條碼高度 mm</label><input type="number" step="0.1" th:field="*{barcodeHeightMm}"></div>
                    </div>
                    <div style="margin-top:14px;">
                        <label><input type="checkbox" th:field="*{showBorder}" style="width:auto;"> 顯示邊框</label>
                    </div>
                    <div style="margin-top:18px;">
                        <button class="btn-primary" type="submit">儲存設定</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="card">
            <div class="card-header">使用說明</div>
            <div class="card-body">
                <p>第一版貼紙採用固定尺寸 PDF。列印時請選擇標籤機，並將列印縮放設定為「實際大小」或「100%」。</p>
                <p>若貼紙位置略有偏移，優先調整標籤機紙張設定，其次再調整本頁的寬高與邊距。</p>
            </div>
        </div>
    </main>
</div>
</body>
</html>
