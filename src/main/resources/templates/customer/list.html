<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>客戶管理</title><link rel="stylesheet" href="/css/app.css"></head>
<body><div class="app"><div th:replace="~{fragments :: sidebar('customers')}"></div><main class="main">
<div class="topbar"><div><h1>客戶管理</h1><div class="subtitle">預設顯示客戶列表；右上新增，列表可編輯。</div></div><div class="topbar-action-wrap">
  <div class="actions" id="listTopActions"><button class="btn btn-primary" type="button" onclick="newCustomer()">新增客戶</button></div>
</div></div>
<div class="card no-print" id="searchCard"><div class="card-header">查詢條件</div><div class="card-body"><form method="get" action="/customers" class="search-form"><div class="grid grid-4"><div><label>客戶代號</label><input name="customerCode" th:value="${customerCode}" placeholder="輸入客戶代號"></div><div><label>客戶名稱</label><input name="customerName" th:value="${customerName}" placeholder="輸入客戶名稱"></div></div><div class="actions form-actions-separated edit-form-actions"><button class="btn btn-primary" type="submit">查詢</button><a class="btn btn-outline" href="/customers">清除</a></div></form></div></div>
<div class="card" id="editCard" style="display:none;"><div class="card-header" style="display:flex;justify-content:space-between;align-items:center;"><span id="editTitle">新增客戶</span><div class="actions"><button id="voidBtn" class="btn btn-danger" type="button" style="display:none;" onclick="voidCustomer()">作廢</button><button id="restoreBtn" class="btn btn-primary" type="button" style="display:none;" onclick="restoreCustomer()">恢復</button></div></div><div class="card-body"><input id="customerId" type="hidden"><input id="active" type="hidden" value="true"><div class="grid grid-4"><div><label>客戶代號</label><input id="customerCode" placeholder="空白則自動編號"></div><div><label>客戶名稱</label><input id="customerName"></div><div><label>電話</label><input id="phone"></div><div><label>聯絡人</label><input id="contactPerson"></div><div><label>送貨地址</label><input id="shippingAddress"></div><div><label>統一編號</label><input id="taxId"></div><div><label>發票抬頭</label><input id="invoiceTitle"></div></div><div class="actions form-actions-separated edit-form-actions"><button id="saveCustomerBtn" class="btn btn-primary" onclick="saveCustomer()">儲存客戶</button><a id="cancelBtn" class="btn btn-outline" href="/customers">取消</a></div><div id="msg"></div></div></div>
<div class="card" id="listCard"><div class="card-header with-actions">
                <span>客戶列表</span>
                <div class="actions no-print">
                    <button class="btn btn-outline btn-compact" type="button" onclick="openColumnChooser('customerListTable')">顯示欄位</button>
                    <button class="btn btn-outline btn-compact" type="button" onclick="window.print()">列印</button>
                    <button class="btn btn-primary btn-compact" type="button" onclick="downloadTableCsv('customerListTable', '客戶列表.csv')">下載</button>
                </div>
            </div><div class="card-body table-scroll vertical-scroll"><table id="customerListTable" class="resizable-table" data-table-key="customer-list"><thead><tr><th>代號</th><th>名稱</th><th>電話</th><th>聯絡人</th><th>送貨地址</th><th>統一編號</th><th>發票抬頭</th><th>狀態</th><th>操作</th></tr></thead><tbody><tr th:each="c : ${customers}"><td th:text="${c.customerCode}"></td><td th:text="${c.customerName}"></td><td th:text="${c.phone}"></td><td th:text="${c.contactPerson}"></td><td th:text="${c.shippingAddress}"></td><td th:text="${c.taxId}"></td><td th:text="${c.invoiceTitle}"></td><td><span class="badge" th:classappend="${c.active == false ? ' badge-danger' : ' badge-success'}" th:text="${c.active == false ? '已作廢' : '正常'}"></span></td><td><div class="list-row-actions"><button class="btn btn-outline" type="button" th:attr="data-id=${c.customerId},data-code=${c.customerCode},data-name=${c.customerName},data-phone=${c.phone},data-contact=${c.contactPerson},data-ship=${c.shippingAddress},data-tax=${c.taxId},data-title=${c.invoiceTitle},data-active=${c.active}" onclick="viewCustomer(this)">查看</button><button class="btn btn-primary" type="button" th:attr="data-id=${c.customerId},data-code=${c.customerCode},data-name=${c.customerName},data-phone=${c.phone},data-contact=${c.contactPerson},data-ship=${c.shippingAddress},data-tax=${c.taxId},data-title=${c.invoiceTitle},data-active=${c.active}" onclick="editCustomer(this)">編輯</button></div></td></tr><tr th:if="${#lists.isEmpty(customers)}"><td colspan="9">無符合條件資料。</td></tr></tbody></table></div></div>
<script>
async function saveCustomer(){const body={customerId:val('customerId')||null,customerCode:val('customerCode'),customerName:val('customerName'),phone:val('phone'),contactPerson:val('contactPerson'),shippingAddress:val('shippingAddress'),taxId:val('taxId'),invoiceTitle:val('invoiceTitle'),active:val('active')!=='false'};const r=await fetch('/api/customers',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});const j=await r.json();document.getElementById('msg').innerHTML='<div class="alert alert-info">'+j.message+'</div>';if(j.success)setTimeout(()=>location.href='/customers',600);}
function showEdit(){document.getElementById('editCard').style.display='block';document.getElementById('listCard').style.display='none';document.getElementById('searchCard').style.display='none';document.getElementById('listTopActions').hidden=true;updateStatusButtons();window.scrollTo({top:0,behavior:'smooth'});}
let currentCustomerButton=null;function ensureViewTopActions(){
  let el=document.getElementById('viewTopActions');
  if(!el){
    el=document.createElement('div');
    el.id='viewTopActions';
    el.className='actions';
    el.innerHTML='<a class="btn btn-outline" href="/customers">返回列表</a><button class="btn btn-primary" type="button" onclick="editCustomerFromView()">編輯</button>';
    document.querySelector('.topbar-action-wrap').appendChild(el);
  }
  return el;
}
function removeViewTopActions(){
  const el=document.getElementById('viewTopActions');
  if(el) el.remove();
}
function setReadonlyMode(readonly){['customerCode','customerName','phone','contactPerson','shippingAddress','taxId','invoiceTitle'].forEach(id=>document.getElementById(id).readOnly=readonly);document.getElementById('saveCustomerBtn').style.display=readonly?'none':'inline-flex';document.getElementById('cancelBtn').style.display=readonly?'none':'inline-flex';}
function newCustomer(){removeViewTopActions();currentCustomerButton=null;removeViewTopActions();document.getElementById('editTitle').innerText='新增客戶';setReadonlyMode(false);['customerId','customerCode','customerName','phone','contactPerson','shippingAddress','taxId','invoiceTitle'].forEach(id=>document.getElementById(id).value='');document.getElementById('active').value='true';showEdit();}
function fillCustomer(btn){document.getElementById('customerId').value=btn.dataset.id||'';document.getElementById('customerCode').value=btn.dataset.code||'';document.getElementById('customerName').value=btn.dataset.name||'';document.getElementById('phone').value=btn.dataset.phone||'';document.getElementById('contactPerson').value=btn.dataset.contact||'';document.getElementById('shippingAddress').value=btn.dataset.ship||'';document.getElementById('taxId').value=btn.dataset.tax||'';document.getElementById('invoiceTitle').value=btn.dataset.title||'';document.getElementById('active').value=String(btn.dataset.active)==='false'?'false':'true';updateStatusButtons();}
function editCustomer(btn){currentCustomerButton=btn;removeViewTopActions();document.getElementById('editTitle').innerText='編輯客戶';setReadonlyMode(false);showEdit();fillCustomer(btn);}
function viewCustomer(btn){currentCustomerButton=btn;document.getElementById('editTitle').innerText='查看客戶';setReadonlyMode(true);showEdit();fillCustomer(btn);document.getElementById('voidBtn').style.display='none';document.getElementById('restoreBtn').style.display='none';ensureViewTopActions();}
function editCustomerFromView(){if(currentCustomerButton){editCustomer(currentCustomerButton);}}
function updateStatusButtons(){const id=val('customerId');const active=val('active')!=='false';document.getElementById('voidBtn').style.display=id&&active?'inline-flex':'none';document.getElementById('restoreBtn').style.display=id&&!active?'inline-flex':'none';}
async function voidCustomer(){const id=val('customerId');if(!id)return;if(!confirm('確定作廢此客戶？'))return;const r=await fetch('/api/customers/'+id+'/void',{method:'POST'});const j=await r.json();document.getElementById('msg').innerHTML='<div class="alert alert-info">'+j.message+'</div>';if(j.success)setTimeout(()=>location.href='/customers',600);}
async function restoreCustomer(){const id=val('customerId');if(!id)return;const r=await fetch('/api/customers/'+id+'/restore',{method:'POST'});const j=await r.json();document.getElementById('msg').innerHTML='<div class="alert alert-info">'+j.message+'</div>';if(j.success)setTimeout(()=>location.href='/customers',600);}
function val(id){return document.getElementById(id).value;}
</script></main></div><script src="/js/table-tools.js"></script>
</body></html>
