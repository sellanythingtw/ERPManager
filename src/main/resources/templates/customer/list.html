<!DOCTYPE html><html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><title>客戶管理</title><link rel="stylesheet" href="/css/app.css"></head><body><div class="app"><div th:replace="~{fragments :: sidebar('customers')}"></div><main class="main"><div class="topbar"><div><h1>客戶管理</h1><div class="subtitle">客戶建檔，供銷貨單與沖帳使用</div></div></div><div class="card"><div class="card-header">新增客戶</div><div class="card-body"><div class="grid grid-4"><div><label>客戶代號</label><input id="customerCode" placeholder="空白則自動編號"></div><div><label>客戶名稱</label><input id="customerName"></div><div><label>電話</label><input id="phone"></div><div><label>聯絡人</label><input id="contactPerson"></div><div><label>送貨地址</label><input id="shippingAddress"></div><div><label>統一編號</label><input id="taxId"></div><div><label>發票抬頭</label><input id="invoiceTitle"></div></div><p><button class="btn-primary" onclick="saveCustomer()">儲存客戶</button></p><div id="msg"></div></div></div><div class="card"><div class="card-header">客戶列表</div><div class="card-body"><table><thead><tr><th>代號</th><th>名稱</th><th>電話</th><th>聯絡人</th><th>送貨地址</th></tr></thead><tbody><tr th:each="c : ${customers}"><td th:text="${c.customerCode}"></td><td th:text="${c.customerName}"></td><td th:text="${c.phone}"></td><td th:text="${c.contactPerson}"></td><td th:text="${c.shippingAddress}"></td></tr></tbody></table></div></div><script>async function saveCustomer(){const body={customerCode:val('customerCode'),customerName:val('customerName'),phone:val('phone'),contactPerson:val('contactPerson'),shippingAddress:val('shippingAddress'),taxId:val('taxId'),invoiceTitle:val('invoiceTitle')};const r=await fetch('/api/customers',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});const j=await r.json();document.getElementById('msg').innerHTML='<div class="alert alert-info">'+j.message+'</div>';if(j.success)setTimeout(()=>location.reload(),600);}function val(id){return document.getElementById(id).value;}</script></main></div></body></html>
