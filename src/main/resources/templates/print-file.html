<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>列印 PDF</title>
    <style>
        html, body { margin:0; height:100%; font-family: Arial, sans-serif; }
        iframe { width:100%; height:100vh; border:0; }
        .bar { position:fixed; right:16px; top:12px; z-index:9; background:#fff; padding:8px 10px; border-radius:8px; box-shadow:0 4px 16px rgba(0,0,0,.12); }
        button { padding:8px 14px; border:0; border-radius:8px; background:#2563eb; color:white; font-weight:700; }
    </style>
</head>
<body>
<div class="bar"><button onclick="window.print()">列印</button></div>
<iframe id="pdfFrame" th:src="@{/local-file(path=${path})}"></iframe>
<script>
window.addEventListener('load', function(){
  setTimeout(function(){ window.print(); }, 700);
});
</script>
</body>
</html>
