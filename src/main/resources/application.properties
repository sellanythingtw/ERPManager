# ERPManager fallback properties.
# 保留 application.yml 作為主要設定；此檔用於某些 IDE/打包環境未正確載入 YAML 時的備援。
spring.application.name=ERPManager
spring.datasource.url=jdbc:sqlite:./app/data/app.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.thymeleaf.cache=false
server.port=8080
server.address=127.0.0.1
inventory.app-name=ERPManager 本地端進銷存系統
inventory.version=0.3.7
inventory.base-dir=./app
inventory.pdf-dir=./app/files/pdf
inventory.label-dir=./app/files/labels
inventory.export-dir=./app/files/export
inventory.backup-dir=./app/files/backup
inventory.google-token-dir=./app/google/tokens
